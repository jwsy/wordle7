<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="Guess the 7-letter word in 6 tries">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Wordle 7">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>Wordle 7</title>
</head>
<body>

  <header>
    <h1>Wordle&nbsp;7</h1>
    <button id="hints-btn" aria-label="Hints">💡</button>
    <button id="settings-btn" aria-label="Settings">⚙</button>
  </header>

  <!-- Hints modal -->
  <div class="modal-overlay" id="hints-modal">
    <div class="modal">
      <button id="close-hints" aria-label="Close">✕</button>
      <h2>Hints</h2>
      <p style="font-size:0.85rem;color:#888;margin-bottom:0.75rem">Try these helpful starter words:</p>
      <div id="hints-list" style="display:flex;flex-direction:column;gap:0.5rem"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <div id="board-container">
    <div id="board"></div>
  </div>

  <div id="keyboard"></div>

  <!-- Result modal -->
  <div class="modal-overlay" id="result-modal">
    <div class="modal">
      <h2 id="result-title"></h2>
      <p id="result-msg"></p>
      <div class="modal-answer" id="result-answer"></div>
      <button class="btn btn-primary" id="share-btn">Share Results</button>
      <button class="btn btn-secondary" id="play-again-btn">Play Again</button>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <button id="close-settings" aria-label="Close">✕</button>
      <h2>Settings</h2>
      <div class="settings-row">
        <span>Hard Mode</span>
        <label class="toggle">
          <input type="checkbox" id="hard-mode-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <p style="font-size:0.78rem;color:#888">Revealed hints must be used in subsequent guesses</p>
      <div class="settings-row">
        <span>Takeshi Mode</span>
        <label class="toggle">
          <input type="checkbox" id="takeshi-mode-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <p style="font-size:0.78rem;color:#888">The answer is always TAKESHI</p>
      <div class="settings-row">
        <span>LaCroix Mode</span>
        <label class="toggle">
          <input type="checkbox" id="lacroix-mode-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <p style="font-size:0.78rem;color:#888">Sparkling pastel theme with bubbles 🫧</p>
    </div>
  </div>

  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
